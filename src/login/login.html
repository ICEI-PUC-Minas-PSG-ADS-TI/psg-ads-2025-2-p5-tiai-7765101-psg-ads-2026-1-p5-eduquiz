<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>EduLink Login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <div class="hero">
            <h1>Onde o conhecimento ganha vida.</h1>
            <p>Plataforma inteligente que utiliza IA para impulsionar seu sucesso escolar.</p>
        </div>

        <div class="login-card">

            <h2>Login</h2>

            <input type="email" id="email" placeholder="Seu email" required>

            <input type="password" id="senha" placeholder="Sua senha" required>

            <button onclick="login()">Entrar</button>

            <a class="criar-conta" href="../cadastro/cadastro.html">
                Criar conta
            </a>

            <p id="erro"></p>

        </div>

    </div>

    <script type="module" src="login.js"></script>

</body>

</html>
